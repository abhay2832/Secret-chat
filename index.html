<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM Chat - Real User Messaging</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #000; --bg2: #111; --text: #fff; --text2: #b3b3b3;
            --accent: #0095f6; --border: #333; --success: #00ff88;
        }
        
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); 
            height: 100vh; overflow: hidden;
        }
        
        .container { display: flex; height: 100vh; }
        
        /* Login/Signup */
        .auth-page { 
            width: 100%; height: 100vh; 
            display: flex; align-items: center; 
            justify-content: center; background: linear-gradient(135deg, var(--bg), var(--bg2));
        }
        
        .auth-card {
            background: var(--bg2); padding: 40px; 
            border-radius: 20px; width: 100%; max-width: 400px;
            border: 1px solid var(--border);
        }
        
        .auth-title { text-align: center; font-size: 28px; margin-bottom: 30px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .input { 
            width: 100%; padding: 16px; background: var(--bg); 
            border: 1px solid var(--border); border-radius: 12px; 
            color: var(--text); font-size: 16px;
        }
        
        .btn { 
            width: 100%; padding: 16px; background: var(--accent); 
            color: white; border: none; border-radius: 12px; 
            font-size: 16px; font-weight: 600; cursor: pointer; 
            transition: background 0.3s;
        }
        
        .btn:hover { background: #1877f2; }
        .btn-secondary { background: var(--border); }
        
        .toggle-auth { text-align: center; margin-top: 20px; }
        .toggle-auth a { color: var(--accent); text-decoration: none; }
        
        /* Main App */
        .sidebar { 
            width: 350px; background: var(--bg2); 
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
        }
        
        .header { 
            padding: 20px; border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; gap: 15px;
        }
        
        .user-avatar { 
            width: 45px; height: 45px; border-radius: 50%; 
            background: linear-gradient(45deg, var(--accent), #ff6b6b); 
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }
        
        .user-info h3 { font-size: 16px; margin-bottom: 2px; }
        .user-info p { font-size: 14px; color: var(--text2); }
        
        .search-box { padding: 20px; }
        #userSearch { width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 25px; color: var(--text); }
        
        .chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { 
            display: flex; align-items: center; gap: 15px; 
            padding: 15px; border-radius: 15px; cursor: pointer; 
            transition: background 0.2s; margin-bottom: 5px;
            position: relative;
        }
        
        .chat-item:hover { background: rgba(255,255,255,0.1); }
        .chat-item.active { background: rgba(0,149,246,0.2); }
        
        .chat-avatar { width: 55px; height: 55px; border-radius: 50%; background: linear-gradient(45deg, var(--accent), #ff6b6b); display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .chat-info h4 { font-size: 15px; margin-bottom: 3px; }
        .chat-preview { font-size: 14px; color: var(--text2); }
        
        .online-dot { position: absolute; right: 15px; top: 20px; width: 12px; height: 12px; background: var(--success); border-radius: 50%; border: 2px solid var(--bg2); }
        
        /* Chat Area */
        .chat-main { flex: 1; display: flex; flex-direction: column; }
        .chat-header { 
            padding: 20px 25px; border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; gap: 20px;
        }
        
        .chat-back { background: none; border: none; color: var(--text2); font-size: 24px; cursor: pointer; padding: 8px; border-radius: 50%; }
        .chat-user h2 { font-size: 18px; }
        .chat-status { font-size: 14px; color: var(--success); }
        
        .messages { flex: 1; overflow-y: auto; padding: 30px 25px; background-image: radial-gradient(circle at 20px 20px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 60px 60px; }
        
        .message { display: flex; margin-bottom: 20px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .message.sent { justify-content: flex-end; }
        .message-bubble { 
            max-width: 65%; padding: 14px 18px; border-radius: 22px; 
            word-wrap: break-word; position: relative;
        }
        
        .message.sent .message-bubble { background: var(--accent); color: white; border-bottom-right-radius: 6px; }
        .message.received .message-bubble { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border-bottom-left-radius: 6px; }
        
        .message-time { font-size: 12px; opacity: 0.7; margin-top: 5px; }
        .status { display: flex; align-items: center; gap: 4px; font-size: 12px; margin-left: 8px; }
        
        .typing { display: flex; align-items: center; gap: 4px; padding: 14px 18px; background: rgba(255,255,255,0.1); border-radius: 22px; border-bottom-left-radius: 6px; }
        .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.6); animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%,60%,100% { transform: scale(1); opacity: 0.6; } 30% { transform: scale(1.3); opacity: 1; } }
        
        .input-area { 
            padding: 20px 25px; border-top: 1px solid var(--border); 
            background: var(--bg2);
        }
        
        .input-wrapper { 
            display: flex; align-items: flex-end; gap: 12px; 
            background: var(--bg); border-radius: 28px; padding: 12px 18px; 
            border: 1px solid var(--border);
        }
        
        .input-wrapper:focus-within { border-color: var(--accent); }
        
        .btn-icon, .send-btn { 
            background: none; border: none; font-size: 20px; 
            color: var(--text2); cursor: pointer; padding: 8px; 
            border-radius: 50%; transition: all 0.2s;
        }
        
        .btn-icon:hover { background: rgba(255,255,255,0.1); color: var(--text); }
        .send-btn { color: var(--accent); font-size: 18px; }
        .send-btn.active { background: var(--accent); color: white; }
        
        #messageInput { 
            flex: 1; background: none; border: none; 
            color: var(--text); font-size: 16px; resize: none; 
            max-height: 100px; outline: none; padding: 4px 0;
        }
        
        .hidden { display: none !important; }
        .online-users { padding: 10px 20px; border-top: 1px solid var(--border); }
        .online-count { color: var(--text2); font-size: 14px; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { position: fixed; z-index: 100; transform: translateX(-100%); width: 80%; }
            .sidebar.open { transform: translateX(0); }
            .chat-main { width: 100vw; }
        }
    </style>
</head>
<body>
    <!-- Auth Pages -->
    <div id="authPage">
        <div class="auth-page">
            <div class="auth-card">
                <h1 class="auth-title" id="authTitle">Welcome Back</h1>
                <form id="authForm">
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" id="username" class="input" required>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="email" class="input" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="password" class="input" required>
                    </div>
                    <button type="submit" class="btn" id="authBtn">Sign In</button>
                </form>
                <div class="toggle-auth">
                    <span id="toggleText">Don't have an account?</span> 
                    <a href="#" id="toggleAuth">Sign Up</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="container hidden">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="header">
                <div class="user-avatar" id="userAvatar"></div>
                <div class="user-info">
                    <h3 id="userName"></h3>
                    <p>Tap to logout</p>
                </div>
            </div>
            
            <div class="search-box">
                <input type="text" id="userSearch" placeholder="Search users...">
            </div>
            
            <div class="chat-list" id="chatList"></div>
            
            <div class="online-users">
                <div class="online-count" id="onlineCount">0 online</div>
            </div>
        </div>

        <!-- Chat Main -->
        <div class="chat-main">
            <div class="chat-header">
                <button class="chat-back" id="backBtn">←</button>
                <div class="chat-user">
                    <h2 id="chatTitle">Select a user</h2>
                    <div class="chat-status" id="chatStatus"></div>
                </div>
            </div>
            
            <div class="messages" id="messages"></div>
            
            <div class="input-area">
                <div class="input-wrapper">
                    <button class="btn-icon">😊</button>
                    <button class="btn-icon" id="attachBtn">📎</button>
                    <textarea id="messageInput" placeholder="Type a message..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn">➤</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global State
        const state = {
            socket: null,
            currentUser: null,
            currentChat: null,
            users: {},
            chats: {},
            messages: {},
            peer: null,
            localStream: null
        };

        // DOM Elements
        const els = {
            authPage: document.getElementById('authPage'),
            mainApp: document.getElementById('mainApp'),
            authForm: document.getElementById('authForm'),
            authTitle: document.getElementById('authTitle'),
            authBtn: document.getElementById('authBtn'),
            toggleAuth: document.getElementById('toggleAuth'),
            toggleText: document.getElementById('toggleText'),
            username: document.getElementById('username'),
            email: document.getElementById('email'),
            password: document.getElementById('password'),
            sidebar: document.getElementById('sidebar'),
            userAvatar: document.getElementById('userAvatar'),
            userName: document.getElementById('userName'),
            userSearch: document.getElementById('userSearch'),
            chatList: document.getElementById('chatList'),
            onlineCount: document.getElementById('onlineCount'),
            backBtn: document.getElementById('backBtn'),
            chatTitle: document.getElementById('chatTitle'),
            chatStatus: document.getElementById('chatStatus'),
            messages: document.getElementById('messages'),
            messageInput: document.getElementById('messageInput'),
            sendBtn: document.getElementById('sendBtn'),
            attachBtn: document.getElementById('attachBtn')
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', init);

        function init() {
            // Connect to Socket.IO server (replace with your server URL)
            state.socket = io('https://chat-server-abc123.onrender.com'); // Use your deployed server
            
            setupEventListeners();
            setupSocketEvents();
        }

        function setupEventListeners() {
            // Auth
            els.authForm.addEventListener('submit', handleAuth);
            els.toggleAuth.addEventListener('click', toggleAuthMode);
            
            // User clicks
            els.userName.addEventListener('click', logout);
            els.userSearch.addEventListener('input', handleUserSearch);
            
            // Chat
            els.backBtn.addEventListener('click', showChatList);
            els.messageInput.addEventListener('input', handleInput);
            els.messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            els.sendBtn.addEventListener('click', sendMessage);
            
            // Auto-resize textarea
            els.messageInput.addEventListener('input', autoResize);
        }

        function toggleAuthMode(e) {
            e.preventDefault();
            const isLogin = els.authTitle.textContent.includes('Welcome');
            
            if (isLogin) {
                els.authTitle.textContent = 'Sign Up';
                els.authBtn.textContent = 'Sign Up';
                els.toggleText.textContent = 'Already have an account?';
                els.toggleAuth.textContent = 'Sign In';
                els.username.required = true;
                els.email.required = true;
            } else {
                els.authTitle.textContent = 'Welcome Back';
                els.authBtn.textContent = 'Sign In';
                els.toggleText.textContent = "Don't have an account?";
                els.toggleAuth.textContent = 'Sign Up';
                els.username.required = true;
                els.email.required = true;
            }
        }

        async function handleAuth(e) {
            e.preventDefault();
            const username = els.username.value.trim();
            const email = els.email.value.trim();
            const password = els.password.value;
            
            if (!username || !email || !password) return alert('Please fill all fields');
            
            const isLogin = els.authTitle.textContent.includes('Welcome');
            
            try {
                const response = await fetch('https://chat-server-abc123.onrender.com/api/auth/' + (isLogin ? 'login' : 'register'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    state.currentUser = data.user;
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showMainApp();
                } else {
                    alert(data.message || 'Error occurred');
                }
            } catch (error) {
                alert('Server error. Make sure backend is running!');
            }
        }

        function showMainApp() {
            els.authPage.classList.add('hidden');
            els.mainApp.classList.remove('hidden');
            
            updateUserDisplay();
            state.socket.emit('userOnline', state.currentUser);
        }

        function updateUserDisplay() {
            els.userAvatar.textContent = state.currentUser.username[0].toUpperCase();
            els.userName.textContent = state.currentUser.username;
        }

        function handleUserSearch(e) {
            const query = e.target.value.toLowerCase();
            const users
