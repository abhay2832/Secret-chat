<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick DM - Instagram Chat</title>
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,height:100vh;background:#000;color:#fff;overflow:hidden}
    
    .screen{display:none;height:100vh;flex-direction:column}
    .screen.active{display:flex}
    
    /* HOME */
    #home{background:linear-gradient(135deg,#1e3c72,#2a5298);justify-content:center;align-items:center;padding:40px;text-align:center}
    .logo{font-size:3rem;margin-bottom:30px}
    .connect-btn{background:linear-gradient(135deg,#f093fb,#f5576c);color:white;border:none;padding:20px 40px;border-radius:50px;font-size:1.2rem;cursor:pointer;transition:all .3s;font-weight:600;margin:20px 0;transform:scale(1)}
    .connect-btn:hover{transform:scale(1.05);box-shadow:0 10px 30px rgba(240,147,251,.4)}
    .status{font-size:1.1rem;margin:20px 0;color:#ddd}
    
    /* CHAT */
    #chatScreen{background:#000}
    .header{padding:20px;background:rgba(0,0,0,.9);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #333}
    .friend-name{font-size:1.2rem;font-weight:600}
    .online{font-size:.8rem;color:#4ade80}
    
    .messages{flex:1;overflow-y:auto;padding:20px;background:#000}
    .message{margin-bottom:15px;display:flex;animation:slideIn .3s}
    .message.sent{justify-content:flex-end}
    .bubble{max-width:70%;padding:12px 16px;border-radius:20px;position:relative}
    .sent .bubble{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border-bottom-right-radius:5px}
    .received .bubble{background:rgba(255,255,255,.1);color:white;border-bottom-left-radius:5px}
    .time{font-size:.7rem;opacity:.7;margin-top:5px}
    .image{max-width:200px;border-radius:15px;cursor:pointer}
    
    .typing{padding:10px 20px;color:#aaa;font-style:italic;font-size:.9rem;display:none}
    
    .input-area{padding:20px;background:rgba(0,0,0,.9);display:flex;gap:10px;align-items:center}
    #messageInput{flex:1;background:rgba(255,255,255,.1);border:none;border-radius:25px;padding:15px 20px;color:white;font-size:1rem}
    #sendBtn{background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:25px;padding:15px 20px;cursor:pointer;font-size:1rem;transition:all .3s}
    #sendBtn:hover{transform:scale(1.05)}
    .photo-btn{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.2);color:white;border:none;cursor:pointer;font-size:1.3rem;display:flex;align-items:center;justify-content:center}
    
    .call-btns{display:flex;gap:10px}
    .call-btn{width:45px;height:45px;border-radius:50%;border:none;background:rgba(255,255,255,.2);color:white;font-size:1.1rem;cursor:pointer;transition:all .3s}
    .call-btn:hover{background:rgba(255,255,255,.3);transform:scale(1.1)}
    
    @keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <!-- HOME SCREEN -->
  <div id="home" class="screen active">
    <div class="logo">💬 Quick DM</div>
    <p style="margin-bottom:20px;font-size:1.2rem">Instagram jaisa chat - bina login!</p>
    <button class="connect-btn" id="connectBtn">🚀 Friend se Connect Karo</button>
    <div class="status" id="status">Ready to chat...</div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chatScreen" class="screen">
    <div class="header">
      <div>
        <div class="friend-name" id="friendName">Friend</div>
        <div class="online" id="onlineStatus">Connecting...</div>
      </div>
      <div class="call-btns">
        <button class="call-btn" id="voiceCall" title="Voice Call">📞</button>
        <button class="call-btn" id="videoCall" title="Video Call">🎥</button>
      </div>
    </div>
    
    <div class="messages" id="messages">
      <div class="message received">
        <div class="bubble">
          <div>✨ Friend connected! Chat shuru karo!</div>
          <div class="time">Abhi</div>
        </div>
      </div>
    </div>
    
    <div class="typing" id="typing">Typing...</div>
    
    <div class="input-area">
      <button class="photo-btn" id="photoBtn">📷</button>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
      <input type="text" id="messageInput" placeholder="Type message...">
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    class QuickDM {
      constructor() {
        this.socket = io('wss://chat-quick.onrender.com/quick');
        this.peer = null;
        this.roomId = 'quick-room-' + Math.random().toString(36).substr(2, 9);
        this.init();
      }

      init() {
        this.bindEvents();
        this.socket.on('connect', () => {
          document.getElementById('status').textContent = 'Server connected! 1-click mein friend connect';
        });
        
        // Friend connected
        this.socket.on('friendConnected', () => {
          document.getElementById('onlineStatus').textContent = 'Online ✅';
          this.showChat();
        });
        
        this.socket.on('message', msg => this.addMessage(msg, 'received'));
        this.socket.on('image', img => this.addImage(img, 'received'));
        this.socket.on('typing', typing => {
          document.getElementById('typing').style.display = typing ? 'block' : 'none';
        });
      }

      bindEvents() {
        document.getElementById('connectBtn').onclick = () => {
          this.socket.emit('joinQuickRoom');
        };
        
        document.getElementById('sendBtn').onclick = () => this.send();
        document.getElementById('messageInput').onkeypress = e => {
          if(e.key==='Enter') this.send();
          else this.socket.emit('typing', true);
        };
        document.getElementById('messageInput').oninput = () => {
          if(!document.getElementById('messageInput').value) 
            this.socket.emit('typing', false);
        };
        
        document.getElementById('photoBtn').onclick = () => 
          document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = e => this.sendPhoto(e);
      }

      send() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if(text) {
          const msg = {
            text, time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
            sender: 'me'
          };
          this.addMessage(msg, 'sent');
          this.socket.emit('message', msg);
          input.value = '';
          this.socket.emit('typing', false);
        }
      }

      sendPhoto(e) {
        const file = e.target.files[0];
        if(file) {
          const reader = new FileReader();
          reader.onload = ev => {
            const img = {
              data: ev.target.result,
              time: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),
              sender: 'me'
            };
            this.addImage(img, 'sent');
            this.socket.emit('image', img);
          };
          reader.readAsDataURL(file);
        }
      }

      addMessage(msg, type) {
        const msgs = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML = `
          <div class="bubble">
            <div>${msg.text}</div>
            <div class="time">${msg.time}</div>
          </div>
        `;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
      }

      addImage(img, type) {
        const msgs = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML = `
          <div class="bubble">
            <img src="${img.data}" class="image" onclick="window.open(this.src)">
            <div class="time">${img.time}</div>
          </div>
        `;
        msgs.appendChild(div);
        msgs.scrollTop = msgs.scrollHeight;
      }

      showChat() {
        document.getElementById('home').classList.remove('active');
        document.getElementById('chatScreen').classList.add('active');
      }
    }

    new QuickDM();
  </script>
</body>
</html>
