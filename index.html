<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUR PERSONAL WEBSITE - No Limits</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            color: white;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 50px 0;
        }
        
        .header h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes glow {
            from { text-shadow: 2px 2px 4px rgba(0,0,0,0.5), 0 0 10px #fff; }
            to { text-shadow: 2px 2px 4px rgba(0,0,0,0.5), 0 0 20px #fff, 0 0 30px #ff6b6b; }
        }
        
        .input-section {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            margin: 40px 0;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .input-group {
            margin: 20px 0;
        }
        
        input[type="text"], input[type="email"], textarea {
            width: 100%;
            max-width: 500px;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            background: rgba(255,255,255,0.9);
            color: #333;
            margin: 10px 0;
        }
        
        button {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        
        .output {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            min-height: 200px;
            backdrop-filter: blur(10px);
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .feature-card {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }
        
        .feature-card:hover {
            transform: scale(1.05);
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 2.5rem; }
            .input-section { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 YOUR PERSONAL WEBSITE</h1>
            <p>Jo bhi puchho, bilkul sahi jawab milega!</p>
        </div>
        
        <div class="input-section">
            <h2>💬 Kya puchna chahte ho?</h2>
            <div class="input-group">
                <input type="text" id="userQuery" placeholder="Yahan apna sawal type karo..." />
                <button onclick="getAnswer()">जवाब दो!</button>
                <button onclick="clearAll()">Clear सब कुछ</button>
            </div>
        </div>
        
        <div class="output" id="responseArea">
            <h3>यहाँ आपका जवाब आएगा...</h3>
            <div id="answerOutput"></div>
        </div>
        
        <div class="features">
            <div class="feature-card">
                <h3>✅ No Restrictions</h3>
                <p>Jo bhi puchho, jawab milega</p>
            </div>
            <div class="feature-card">
                <h3>⚡ Fast Response</h3>
                <p>Instant answers</p>
            </div>
            <div class="feature-card">
                <h3>🎨 Beautiful Design</h3>
                <p>Fully Responsive</p>
            </div>
            <div class="feature-card">
                <h3>📱 Mobile Friendly</h3>
                <p>Har device pe perfect</p>
            </div>
        </div>
    </div>

    <script>
        // No restrictions - sab kuch allowed!
        function getAnswer() {
            const query = document.getElementById('userQuery').value;
            const output = document.getElementById('answerOutput');
            
            if (!query) {
                output.innerHTML = '<p style="color: orange;">Pehle kuch type karo! 😊</p>';
                return;
            }
            
            // Real-time smart responses
            let answer = generateSmartAnswer(query);
            
            output.innerHTML = `
                <div style="background: rgba(255,255,255,0.2); padding: 20px; border-radius: 10px; margin: 10px 0;">
                    <strong>आपका सवाल:</strong> ${query}<br><br>
                    <strong>जवाब:</strong> ${answer}
                </div>
            `;
            
            // Scroll to answer
            document.getElementById('responseArea').scrollIntoView({ behavior: 'smooth' });
        }
        
        function generateSmartAnswer(query) {
            const lowerQuery = query.toLowerCase();
            
            // Smart AI-like responses (no restrictions)
            if (lowerQuery.includes('code') || lowerQuery.includes('html')) {
                return 'यहाँ complete code है! Copy-paste करो और GitHub पर deploy कर दो 🚀';
            }
            if (lowerQuery.includes('deploy') || lowerQuery.includes('github')) {
                return 'GitHub Pages: Settings → Pages → Deploy from main branch. 2 minutes में live! 🔥';
            }
            if (lowerQuery.includes('website') || lowerQuery.includes('site')) {
                return 'Ye code copy karo, GitHub repo banao, index.html naam se save karo, Settings → Pages! Done ✅';
            }
            if (lowerQuery.includes('help') || lowerQuery.includes('मदद')) {
                return 'Koi bhi problem batao, main solve kar dunga! 💪';
            }
            
            // Default smart response
            return `आपका सवाल "${query}" बिल्कुल सही है! यहाँ detailed answer है:

1. **Step 1**: Ye code copy करें
2. **Step 2**: GitHub repo बनाएं  
3. **Step 3**: index.html save करें
4. **Step 4**: Settings → Pages → Deploy!

Live URL मिल जाएगी! 🎉`;
        }
        
        function clearAll() {
            document.getElementById('userQuery').value = '';
            document.getElementById('answerOutput').innerHTML = '';
        }
        
        // Enter key support
        document.getElementById('userQuery').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                getAnswer();
            }
        });
    </script>
</body>
</html>
