<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeChat - Instant Messaging</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            color: white;
        }

        .container {
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        /* Welcome Screen */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .user-code {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            padding: 20px 40px;
            border-radius: 25px;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            margin: 20px 0;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .user-code:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .copy-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .copy-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102,126,234,0.4);
        }

        .connect-section {
            margin-top: 40px;
            width: 100%;
            max-width: 400px;
        }

        .connect-input {
            width: 100%;
            padding: 18px 25px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            color: white;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 20px;
        }

        .connect-input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .connect-input:focus {
            outline: none;
            border-color: #fff;
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
        }

        .connect-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00d4aa, #00b894);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .connect-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0,212,170,0.4);
        }

        .connect-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Chat Screen */
        .chat-screen {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        .chat-screen.active {
            display: flex;
        }

        .chat-header {
            padding: 20px 25px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .partner-info {
            flex: 1;
        }

        .partner-code {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .partner-status {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .online-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .call-buttons {
            display: flex;
            gap: 10px;
        }

        .call-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all 0.3s;
        }

        .voice-call {
            background: linear-gradient(135deg, #28a745, #20c997);
        }

        .video-call {
            background: linear-gradient(135deg, #007bff, #0056b3);
        }

        .call-btn:hover {
            transform: scale(1.1);
        }

        .messages-container {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }

        .message {
            display: flex;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-bottom-right-radius: 5px;
        }

        .message.received .message-bubble {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border-bottom-left-radius: 5px;
        }

        .message-time {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 8px;
            text-align: right;
        }

        .message-status {
            position: absolute;
            bottom: 5px;
            right: 10px;
            font-size: 0.75rem;
        }

        .message-image {
            max-width: 250px;
            max-height: 250px;
            border-radius: 15px;
            cursor: pointer;
            margin-top: 10px;
        }

        .message-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .message-bubble:hover .message-actions {
            opacity: 1;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: rgba(255,255,255,0.7);
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            margin-left: 10px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        .input-container {
            padding: 25px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            padding: 15px 20px;
            border-radius: 30px;
            backdrop-filter: blur(20px);
        }

        .attach-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .attach-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .message-input {
            flex: 1;
            border: none;
            background: none;
            color: white;
            font-size: 1rem;
            resize: none;
            max-height: 120px;
            outline: none;
        }

        .message-input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #00d4aa, #00b894);
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover:not(:disabled) {
            transform: scale(1.1);
        }

        .send-btn:disabled {
            opacity: 0.5;
        }

        /* Call Overlay */
        .call-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .call-overlay.active {
            display: flex;
        }

        .call-videos {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .video-container {
            position: relative;
        }

        .local-video {
            width: 150px;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
            position: absolute;
            bottom: 20px;
            right: 20px;
            border: 3px solid rgba(255,255,255,0.3);
        }

        .remote-video {
            width: 500px;
            height: 350px;
            object-fit: cover;
            border-radius: 25px;
            border: 4px solid rgba(255,255,255,0.2);
        }

        .call-info {
            text-align: center;
            margin-bottom: 40px;
        }

        .call-type {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .call-timer {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .call-controls {
            display: flex;
            gap: 20px;
        }

        .end-call {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #dc3545;
            border: none;
            color: white;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .end-call:hover {
            transform: scale(1.1);
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 30px;
            right: 30px;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(40,167,69,0.4);
            transform: translateX(400px);
            transition: transform 0.4s ease;
            z-index: 2000;
        }

        .notification.show {
            transform: translateX(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo { font-size: 2rem; }
            .user-code { font-size: 2rem; }
            .remote-video { width: 300px; height: 200px; }
            .local-video { width: 100px; height: 140px; }
            .call-videos { flex-direction: column; align-items: center; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Welcome Screen -->
        <div class="welcome-screen" id="welcomeScreen">
            <div class="logo">📱 CodeChat</div>
            <div class="user-code" id="userCode">Generating...</div>
            <button class="copy-btn" onclick="copyCode()">
                📋 Copy My Code
            </button>
            <div class="connect-section">
                <input type="text" class="connect-input" id="friendCode" placeholder="Enter Friend Code" maxlength="6">
                <button class="connect-btn" onclick="connectToFriend()">Connect</button>
                <div style="margin-top: 20px; opacity: 0.7; font-size: 0.9rem;">
                    Share your code with friends to chat instantly!
                </div>
            </div>
        </div>

        <!-- Chat Screen -->
        <div class="chat-screen" id="chatScreen">
            <div class="chat-header">
                <button class="back-btn" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="partner-info">
                    <div class="partner-code" id="partnerCode">Loading...</div>
                    <div class="partner-status" id="partnerStatus">
                        <span class="online-dot"></span>Online
                    </div>
                </div>
                <div class="call-buttons">
                    <button class="call-btn voice-call" onclick="startVoiceCall()">
                        <i class="fas fa-phone"></i>
                    </button>
                    <button class="call-btn video-call" onclick="startVideoCall()">
                        <i class="fas fa-video"></i>
                    </button>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="typing-indicator" id="typingIndicator" style="display: none;">
                    <div>Typing...</div>
                    <div class="typing-dots">
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                        <div class="typing-dot"></div>
                    </div>
                </div>
            </div>
            <div class="input-container">
                <div class="input-wrapper">
                    <button class="attach-btn" onclick="document.getElementById('imageInput').click()">
                        <i class="fas fa-image"></i>
                        <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImage()">
                    </button>
                    <textarea class="message-input" id="messageInput" placeholder="Type a message..." rows="1" oninput="autoResize()" onkeypress="handleKeyPress(event)
