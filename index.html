<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickChat - Instagram DM Clone (No Login)</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      overflow: hidden;
      color: #333;
    }

    .screen {
      display: none;
      height: 100vh;
      position: relative;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
    }

    /* Home Screen */
    #homeScreen {
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .logo {
      font-size: 2.5rem;
      margin-bottom: 40px;
      background: linear-gradient(45deg, #fff, #f0f0f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .code-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      backdrop-filter: blur(10px);
      max-width: 400px;
      width: 90%;
    }

    .your-code h3, .connect-section h3 {
      margin-bottom: 15px;
      color: #333;
      font-size: 1.1rem;
    }

    .code-display {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 20px;
      border-radius: 12px;
      font-size: 1.8rem;
      font-weight: bold;
      letter-spacing: 3px;
      margin-bottom: 15px;
      text-align: center;
    }

    .copy-btn, #connectBtn {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s;
      margin: 5px;
    }

    .copy-btn:hover, #connectBtn:hover {
      background: #5a67d8;
      transform: translateY(-2px);
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    #friendCode {
      flex: 1;
      padding: 15px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
    }

    /* Chat Screen */
    #chatScreen {
      background: #000;
    }

    .chat-header {
      background: rgba(0, 0, 0, 0.9);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .friend-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .friend-code {
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .online-status {
      font-size: 0.8rem;
      color: #4ade80;
    }

    .call-buttons button {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      margin-left: 10px;
      transition: all 0.3s;
    }

    .call-buttons button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.1);
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #000;
      scroll-behavior: smooth;
    }

    .message {
      margin-bottom: 15px;
      display: flex;
      animation: messageSlide 0.3s ease;
    }

    .message.sent {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 18px;
      position: relative;
      word-wrap: break-word;
    }

    .message.sent .message-bubble {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.received .message-bubble {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border-bottom-left-radius: 4px;
    }

    .message-time {
      font-size: 0.7rem;
      opacity: 0.7;
      margin-top: 4px;
    }

    .message-image {
      max-width: 200px;
      max-height: 200px;
      border-radius: 12px;
      cursor: pointer;
    }

    .message-actions {
      position: absolute;
      top: 5px;
      right: 5px;
      display: none;
      gap: 5px;
    }

    .message.sent .message-actions {
      right: 5px;
    }

    .message:hover .message-actions {
      display: flex;
    }

    .edit-btn, .delete-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
    }

    .typing-indicator {
      padding: 10px 20px;
      color: rgba(255, 255, 255, 0.7);
      font-style: italic;
      font-size: 0.9rem;
      display: none;
    }

    .message-input-container {
      padding: 15px 20px;
      background: rgba(0, 0, 0, 0.9);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #messageInput {
      flex: 1;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 25px;
      padding: 15px 20px;
      color: white;
      font-size: 1rem;
      outline: none;
    }

    #sendBtn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 15px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s;
    }

    #sendBtn:hover:not(:disabled) {
      transform: scale(1.05);
    }

    .image-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s;
    }

    .image-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.1);
    }

    /* Call UI */
    .call-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .call-container.active {
      display: flex;
    }

    .call-content {
      text-align: center;
      color: white;
    }

    .call-type {
      font-size: 1.5rem;
      margin-bottom: 20px;
    }

    video {
      width: 300px;
      height: 200px;
      background: #333;
      border-radius: 12px;
      margin: 10px;
    }

    .call-controls {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }

    .call-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .answer { background: #4ade80; color: white; }
    .end { background: #ef4444; color: white; }
    .reject { background: #6b7280; color: white; }

    @keyframes messageSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .code-container { padding: 20px; }
      .code-display { font-size: 1.5rem; }
      video { width: 250px; height: 180px; }
    }
  </style>
</head>
<body>
  <!-- Home Screen -->
  <div id="homeScreen" class="screen active">
    <div class="logo">💬 QuickChat</div>
    <div class="code-container">
      <div class="your-code">
        <h3>Your Code</h3>
        <div class="code-display" id="userCode">Connecting...</div>
        <button id="copyCode" class="copy-btn">📋 Copy</button>
      </div>
      <div class="connect-section">
        <h3>👫 Connect with Friend</h3>
        <div class="input-group">
          <input type="text" id="friendCode" placeholder="Enter Friend Code" maxlength="6">
          <button id="connectBtn">Connect</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chatScreen" class="screen">
    <div class="chat-header">
      <div class="friend-info">
        <div class="friend-code" id="friendCodeDisplay">-</div>
        <div class="online-status" id="onlineStatus">Connecting...</div>
      </div>
      <div class="call-buttons">
        <button id="voiceCall" title="Voice Call">📞</button>
        <button id="videoCall" title="Video Call">🎥</button>
      </div>
    </div>

    <div class="messages-container" id="messagesContainer">
      <div class="message received">
        <div class="message-bubble">
          <p>💬 Chat connected! Say hello! ✨</p>
          <div class="message-time">Now</div>
        </div>
      </div>
    </div>

    <div class="typing-indicator" id="typingIndicator"></div>

    <div class="message-input-container">
      <label for="imageInput" class="image-btn">📷</label>
      <input type="file" id="imageInput" accept="image/*" style="display: none;">
      <input type="text" id="messageInput" placeholder="Type a message...">
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <!-- Call UI -->
  <div id="callContainer" class="call-container">
    <div class="call-content">
      <div class="call-type" id="callType">Incoming Call</div>
      <video id="remoteVideo" autoplay playsinline muted></video>
      <video id="localVideo" autoplay playsinline muted style="width: 120px; height: 90px; position: absolute; bottom: 20%; right: 20%;"></video>
      <div class="call-controls">
        <button id="answerCall" class="call-btn answer">✅ Answer</button>
        <button id="rejectCall" class="call-btn reject">❌ Reject</button>
        <button id="endCall" class="call-btn end" style="display: none;">❌ End</button>
      </div>
    </div>
  </div>

  <script>
    class QuickChat {
      constructor() {
        this.socket = io('https://chat-quick.onrender.com'); // FREE HOSTED SERVER
        this.userCode = null;
        this.roomId = null;
        this.currentCall = null;
        this.localStream = null;
        this.init();
      }

      init() {
        this.bindEvents();
        this.connectSocket();
      }

      bindEvents() {
        // Home screen
        document.getElementById('copyCode').onclick = () => this.copyCode();
        document.getElementById('connectBtn').onclick = () => this.connect();
        document.getElementById('friendCode').onkeypress = (e) => {
          if (e.key === 'Enter') this.connect();
        };

        // Chat screen
        document.getElementById('sendBtn').onclick = () => this.sendMessage();
        document.getElementById('messageInput').onkeypress = (e) => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            this.sendMessage();
          }
        };
        document.getElementById('imageInput').onchange = (e) => this.sendImage(e);
        document.getElementById('voiceCall').onclick = () => this.startCall('voice');
        document.getElementById('videoCall').onclick = () => this.startCall('video');

        // Call controls
        document.getElementById('answerCall').onclick = () => this.answerCall();
        document.getElementById('rejectCall').onclick = () => this.rejectCall();
        document.getElementById('endCall').onclick = () => this.endCall();
      }

      connectSocket() {
        this.socket.on('connect', () => {
          console.log('Connected to server');
        });

        this.socket.on('userCode', (code) => {
          this.userCode = code;
          document.getElementById('userCode').textContent = code;
        });

        this.socket.on('error', (msg) => {
          alert(msg);
        });

        // Chat events
        this.socket.on('roomJoined', (data) => {
          this.roomId = data.roomId;
          document.getElementById('friendCodeDisplay').textContent = data.friendCode;
          this.showChatScreen();
        });

        this.socket.on('friendJoined', (data) => {
          this.roomId = data.roomId;
          document.getElementById('friendCodeDisplay').textContent = data.code;
          document.getElementById('onlineStatus').textContent = 'Online ✅';
          this.showChatScreen();
        });

        this.socket.on('userLeft', () => {
          document.getElementById('onlineStatus').textContent = 'Offline ❌';
        });

        this.socket.on('newMessage', (msg) => this.addMessage(msg, 'received'));
        this.socket.on('messageSent', (msg) => this.addMessage(msg, 'sent'));
        this.socket.on('newImage', (msg) => this.addMessage(msg, 'received'));
        this.socket.on('imageSent', (msg) => this.addMessage(msg, 'sent'));
        this.socket.on('messageEdited', (msg) => this.updateMessage(msg));
        this.socket.on('messageDeleted', (id) => this.deleteMessage(id));
        this.socket.on('userTyping', (data) => this.showTyping(data));

        // Call events
        this.socket.on('incomingCall', (data) => this.handleIncomingCall(data));
        this.socket.on('callAnswered', (data) => this.handleCallAnswered(data));
        this.socket.on('ice-candidate', (data) => this.handleIceCandidate(data));
      }

      copyCode() {
        navigator.clipboard.writeText(this.userCode);
        const btn = document.getElementById('copyCode');
        const original = btn.textContent;
        btn.textContent = '✅ Copied!';
        setTimeout(() => btn.textContent = original, 2000);
      }

      connect() {
        const code = document.getElementById('friendCode').value.trim().toUpperCase();
        if (code && code !== this.userCode) {
          this.socket.emit('joinRoom', code);
        }
      }

      showChatScreen() {
        document.getElementById('homeScreen').classList.remove('active');
        document.getElementById('chatScreen').classList.add('active');
      }

      sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (text && this.roomId) {
          this.socket.emit('message', { roomId: this.roomId, text });
          input.value = '';
        }
      }

      sendImage(event) {
        const file = event.target.files[0];
        if (file && this.roomId) {
          const reader = new FileReader();
          reader.onload = (e) => {
            this.socket.emit('image', { roomId: this.roomId, image: e.target.result });
          };
