<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeChat - Connect with Code</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --bg2: #1a1a1a;
            --bg3: #2a2a2a;
            --text: #ffffff;
            --text2: #b0b0b0;
            --accent: #00d4ff;
            --accent2: #ff6b6b;
            --success: #00ff88;
            --border: rgba(255,255,255,0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* Home Screen */
        .home-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .logo {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px var(--accent)); }
            to { filter: drop-shadow(0 0 20px var(--accent)); }
        }

        .code-container {
            background: var(--bg2);
            padding: 30px 40px;
            border-radius: 20px;
            border: 2px solid var(--border);
            margin: 30px 0;
            backdrop-filter: blur(20px);
        }

        .your-code {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 8px;
            background: linear-gradient(135deg, var(--accent), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .code-label {
            font-size: 14px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .copy-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .copy-btn:hover {
            background: var(--success);
            transform: scale(1.05);
        }

        .connect-section {
            margin-top: 40px;
        }

        .connect-input {
            width: 300px;
            padding: 18px 24px;
            background: var(--bg3);
            border: 2px solid var(--border);
            border-radius: 25px;
            color: var(--text);
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 3px;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .connect-btn {
            background: var(--accent2);
            color: white;
            border: none;
            padding: 18px 36px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .connect-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        .connect-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
            transform: none;
        }

        /* Chat Screen */
        .chat-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            margin: 0 auto;
        }

        .chat-header {
            padding: 25px 40px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .codes-display {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .code-display {
            text-align: center;
        }

        .code-display .code-label {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 5px;
        }

        .friend-code {
            font-size: 24px;
            font-weight: 700;
            color: var(--success);
            letter-spacing: 4px;
        }

        .disconnect-btn {
            background: var(--accent2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .disconnect-btn:hover {
            background: #ff5252;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            background-image: 
                radial-gradient(circle at 25px 25px, rgba(255,255,255,0.05) 2px, transparent 0),
                radial-gradient(circle at 75px 75px, rgba(255,255,255,0.03) 1px, transparent 0);
            background-size: 100px 100px;
        }

        .message {
            display: flex;
            margin-bottom: 25px;
            animation: messageSlide 0.4s ease-out;
            max-width: 80%;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .message-bubble {
            max-width: 100%;
            padding: 18px 24px;
            border-radius: 25px;
            position: relative;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, var(--accent), var(--success));
            color: white;
            border-bottom-right-radius: 8px;
        }

        .message.received .message-bubble {
            background: rgba(255,255,255,0.1);
            border-bottom-left-radius: 8px;
        }

        .message-time {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 8px;
        }

        .message-status {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            margin-top: 4px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 18px 24px;
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
            border-bottom-left-radius: 8px;
            backdrop-filter: blur(20px);
            margin-bottom: 25px;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.6);
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: scale(1); opacity: 0.4; }
            30% { transform: scale(1.2); opacity: 1; }
        }

        .input-container {
            padding: 30px 40px;
            background: var(--bg2);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            background: var(--bg3);
            border-radius: 30px;
            padding: 20px 25px;
            border: 2px solid var(--border);
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0,212,255,0.3);
        }

        .input-icon {
            font-size: 22px;
            color: var(--text2);
            cursor: pointer;
            transition: color 0.3s;
        }

        .input-icon:hover {
            color: var(--text);
        }

        #messageInput {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-size: 16px;
            resize: none;
            max-height: 120px;
            outline: none;
            font-family: inherit;
        }

        #messageInput::placeholder {
            color: var(--text2);
        }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--success);
            transform: scale(1.1);
        }

        .send-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        /* Call UI */
        .call-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 1000;
            display: none;
        }

        .call-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .remote-video,
        .local-video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .local-video {
            width: 150px;
            height: 200px;
            top: 20px;
            right: 20px;
            border-radius: 15px;
            border: 3px solid rgba(255,255,255,0.2);
        }

        .call-controls {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }

        .call-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .voice-call-btn {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
        }

        .video-call-btn {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: white;
        }

        .end-call-btn {
            background: var(--accent2);
            color: white;
            font-size: 28px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .home-screen {
                padding: 20px;
            }

            .connect-input {
                width: 100%;
                max-width: 350px;
            }

            .chat-messages {
                padding: 20px;
            }

            .input-container {
                padding: 20px;
            }

            .codes-display {
                flex-direction: column;
                gap: 15px;
            }

            .friend-code {
                font-size: 20px;
            }
        }

        /* Utilities */
        .hidden { display: none !important; }
        .pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body>
    <!-- Home Screen -->
    <div id="homeScreen" class="home-screen">
        <div class="logo">CodeChat</div>
        <div class="code-container">
            <div class="code-label">Your Code</div>
            <div class="your-code" id="myCode">Generating...</div>
            <button class="copy-btn" id="copyCodeBtn">Copy Code</button>
        </div>
        <div class="connect-section">
            <input type="text" class="connect-input" id="friendCodeInput" placeholder="Enter Friend Code" maxlength="6">
            <br>
            <button class="connect-btn" id="connectBtn">Connect</button>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen" class="chat-screen hidden">
        <div class="chat-header">
            <div class="codes-display">
                <div class="code-display">
                    <div class="code-label">You</div>
                    <div class="your-code" id="chatMyCode">-</div>
                </div>
                <div class="code-display">
                    <div class="code-label">Friend</div>
                    <div class="friend-code" id="chatFriendCode">-</div>
                </div>
            </div>
            <button class="disconnect-btn" id="disconnectBtn">Disconnect</button>
        </div>
        
        <div class="chat-messages" id="messages"></div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <div class="input-icon" id="voiceCallBtn">📞</div>
                <div class="input-icon" id="videoCallBtn">📹</div>
                <div class="input-icon" id="imageBtn">🖼️</div>
                <textarea id="messageInput" placeholder="Type a message..." rows="1"></textarea>
                <button class="send-btn" id="sendBtn" disabled>➤</button>
            </div>
        </div>
    </div>

    <!-- Call Overlay -->
    <div id="callOverlay" class="call-overlay">
        <div class="call-container">
            <video id="remoteVideo" class="remote-video" autoplay playsinline muted></video>
            <video id="localVideo" class="local-video" autoplay playsinline muted></video>
            <div class="call-controls">
                <button class="call-btn voice-call-btn" id="acceptVoiceBtn">✅</button>
                <button class="call-btn video-call-btn" id="acceptVideoBtn">📹</button>
                <button class="call-btn end-call-btn" id="endCallBtn">📞</button>
            </div>
        </div>
    </div>

    <script>
        class CodeChat {
            constructor() {
                this.socket = io('wss://codechat-server.onrender.com'); // Replace with your server
                this.myCode = this.generateCode();
                this.friendCode = null;
                this.peer = null;
                this.currentCall = null;
                this.localStream = null;
                
                this.init();
            }

            generateCode() {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
                let code = '';
                for (let i = 0; i < 6; i++) {
                    code += chars[Math.floor(Math.random() * chars.length)];
                }
                return code;
            }

            init() {
                this.bindEvents();
                this.socket.emit('join', this.myCode);
                this.updateMyCode();
                
                // Auto-generate new code on refresh
                window.addEventListener('beforeunload', () => {
                    this.socket.emit('leave', this.myCode);
                });
            }

            bindEvents() {
                // Home screen
                document.getElementById('copyCodeBtn').onclick = () => this.copyCode();
                document.getElementById('connectBtn').onclick = () => this.connect();
                document.getElementById('friendCodeInput').onkeypress = (e) => {
                    if (e.key === 'Enter') this.connect();
                };

                // Chat screen
                document.getElementById('disconnectBtn').onclick = () => this.disconnect();
                document.getElementById('sendBtn').onclick = () => this.sendMessage();
                document.getElementById('messageInput').oninput = (e) => this.handleInput(e);
                document.getElementById('messageInput').onkeypress = (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sendMessage();
                    }
                };

                document.getElementById('voiceCallBtn').onclick = () => this.startVoiceCall();
