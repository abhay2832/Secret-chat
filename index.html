<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeChat - Instant Messaging</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            max-width: 1400px;
            margin: 0 auto;
            background: #000;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Sidebar */
        .sidebar {
            width: 380px;
            background: #111;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .user-info {
            padding: 20px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }

        .user-code {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 3px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-code:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.02);
        }

        .copy-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 14px;
        }

        .connect-section {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .connect-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 25px;
            background: #222;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .connect-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        .connect-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .connect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .recent-chats {
            margin-top: 20px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 15px;
            cursor: pointer;
            border-radius: 15px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .chat-item:hover, .chat-item.active {
            background: rgba(102, 126, 234, 0.2);
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
            margin-right: 15px;
        }

        .chat-info h4 {
            color: white;
            margin-bottom: 5px;
        }

        .chat-status {
            font-size: 12px;
            color: #888;
        }

        .online-status {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 8px;
        }

        /* Chat Window */
        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        .chat-header {
            padding: 20px;
            background: #111;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
        }

        .chat-partner {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .partner-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 16px;
        }

        .partner-info h3 {
            color: white;
            margin-bottom: 2px;
        }

        .partner-status {
            font-size: 14px;
            color: #888;
        }

        .call-buttons {
            display: flex;
            gap: 10px;
        }

        .call-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s;
        }

        .voice-call {
            background: #28a745;
            color: white;
        }

        .video-call {
            background: #007bff;
            color: white;
        }

        .call-btn:hover {
            transform: scale(1.1);
        }

        .messages-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #000;
        }

        .message {
            display: flex;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 60%;
            padding: 12px 18px;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.received .message-bubble {
            background: #333;
            color: white;
            border-bottom-left-radius: 5px;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .message-status {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 12px;
            margin-left: 10px;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 15px;
            cursor: pointer;
        }

        .message-actions {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.8);
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .message-bubble:hover .message-actions {
            opacity: 1;
        }

        .input-container {
            padding: 20px;
            background: #111;
            border-top: 1px solid #333;
        }

        .message-input-container {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .emoji-btn, .attach-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            background: #333;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s;
        }

        .emoji-btn:hover, .attach-btn:hover {
            background: #444;
            transform: scale(1.05);
        }

        .message-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #333;
            border-radius: 25px;
            background: #222;
            color: white;
            font-size: 16px;
            resize: none;
            max-height: 120px;
        }

        .message-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: scale(1.1);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            padding: 12px 18px;
            color: #888;
            font-style: italic;
        }

        .no-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #888;
            text-align: center;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 1000;
        }

        .notification.show {
            transform: translateX(0);
        }

        .call-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            color: white;
        }

        .local-video, .remote-video {
            width: 300px;
            height: 200px;
            background: #333;
            border-radius: 15px;
            margin: 10px;
        }

        .call-controls {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }

        .end-call {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #dc3545;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: 50vh;
            }
            .chat-window {
                height: 50vh;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #111;
        }

        ::-webkit-scrollbar-thumb {
            background: #666;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // Main App Component
        function App() {
            const [userCode, setUserCode] = useState('');
            const [socket, setSocket] = useState(null);
            const [currentChat, setCurrentChat] = useState(null);
            const [recentChats, setRecentChats] = useState([]);
            const [messages, setMessages] = useState([]);
            const [newMessage, setNewMessage] = useState('');
            const [typing, setTyping] = useState(false);
            const [onlineStatus, setOnlineStatus] = useState({});
            const [showNotification, setShowNotification] = useState(false);
            const [notificationMsg, setNotificationMsg] = useState('');
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [imagePreview, setImagePreview] = useState(null);
            const [callState, setCallState] = useState(null);
            const [localStream, setLocalStream] = useState(null);
            const [remoteStream, setRemoteStream] = useState(null);
            const peerRef = useRef(null);
            const messagesEndRef = useRef(null);

            // Generate unique user code
            useEffect(() => {
                const code = Math.random().toString(36).substring(2, 8).toUpperCase();
                setUserCode(code);
                localStorage.setItem('userCode', code);
            }, []);

            // Initialize Socket connection
            useEffect(() => {
                const newSocket = io('https://chat-server-7k9p2.onrender.com');
                setSocket(newSocket);

                newSocket.on('connect', () => {
                    newSocket.emit('register', userCode);
                });

                newSocket.on('user-online', (data) => {
                    setOnlineStatus(prev => ({ ...prev, [data.code]: true }));
                });

                newSocket.on('user-offline', (data) => {
                    setOnlineStatus(prev => ({ ...prev, [data.code]: false }));
                });

                newSocket.on('message', (data) => {
                    if (data.to === userCode || data.from === userCode) {
                        setMessages(prev => [...prev, { ...data, id: Date.now() }]);
                        if (data.to === userCode && currentChat !== data.from) {
                            showNotification(`New message from ${data.from}`);
                            setRecentChats(prev => {
                                const exists = prev.find(c => c.code === data.from);
                                if (exists) {
                                    return prev.map(c => 
                                        c.code === data.from 
                                            ? { ...c, lastMessage: data.text, timestamp: Date.now() }
                                            : c
                                    );
                                }
                                return [{ code: data.from, lastMessage: data.text, timestamp: Date.now() }, ...prev];
                            });
                        }
                    }
                });

                newSocket.on('typing', (data) => {
                    if (data.to === userCode && data.from === currentChat) {
                        setTyping(true);
                        setTimeout(() => setTyping(false), 2000);
                    }
                });

                newSocket.on('chat-joined', (data) => {
                    if (data.code === userCode) {
                        setRecentChats(prev => {
                            if (!prev.find(c => c.code === data.partner)) {
                                return [...prev, { code: data.partner, timestamp: Date.now() }];
                            }
                            return prev;
                        });
                    }
                });

                return () => {
                    newSocket.disconnect();
                };
            }, [userCode, currentChat]);

            // WebRTC Setup
            useEffect(() => {
                peerRef.current = new Peer(userCode, {
                    host: 'peerjs-server-7k9p2.onrender.com',
                    secure: true,
                    port: 443
                });

                peerRef.current.on('call', (call) => {
                    navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                        .then(stream => {
                            setLocalStream(stream);
                            call.answer(stream);
                            call.on('stream', (remoteStream) => {
                                setRemoteStream(remoteStream);
                            });
                        });
                });
            }, [userCode]);

            const scrollToBottom = useCallback(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, []);

            useEffect(() => {
                scrollToBottom();
            }, [messages, scrollToBottom]);

            const copyCode = () => {
                navigator.clipboard.writeText(userCode);
                showNotification('Code copied!');
            };

            const connectToUser = (code) => {
                if (code === userCode || recentChats.find(c => c.code === code)) {
                    setCurrentChat(code);
                    return;
                }
