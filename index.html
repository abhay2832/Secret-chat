<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp - Instant Chat</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#111;height:100vh;overflow:hidden}
    
    .container{height:100vh;display:flex;flex-direction:column;background:#0b141a;color:#fff}
    
    .header{
      background:#202c33;padding:20px;display:flex;align-items:center;justify-content:center;
      border-bottom:1px solid #2a3942;font-size:1.5rem;font-weight:600;
    }
    
    .status{
      text-align:center;padding:20px;background:#202c33;
      font-size:1.1rem;color:#25d366;
    }
    
    .messages{
      flex:1;overflow-y:auto;padding:20px;background:#0b141a;
      display:flex;flex-direction:column;gap:15px;
    }
    
    .message{
      max-width:70%;padding:12px 16px;border-radius:20px;
      animation:messageSlide .3s ease;
      word-wrap:break-word;
    }
    
    .message.sent{
      align-self:flex-end;background:linear-gradient(135deg,#25d366,#128c7e);
      border-bottom-right-radius:5px;
    }
    
    .message.received{
      align-self:flex-start;background:rgba(255,255,255,.15);
      border-bottom-left-radius:5px;backdrop-filter:blur(10px);
    }
    
    .message-time{
      font-size:.7rem;opacity:.8;margin-top:5px;text-align:right;
    }
    
    .message-image{
      max-width:250px;border-radius:15px;cursor:pointer;
      max-height:300px;
    }
    
    .typing{
      display:flex;gap:5px;padding:10px;align-items:center;
      color:#8696a0;font-style:italic;font-size:.9rem;
      animation:typingAnim 1.5s infinite;
    }
    
    .input-area{
      padding:20px;background:#202c33;border-top:1px solid #2a3942;
      display:flex;gap:10px;align-items:end;
    }
    
    #messageInput{
      flex:1;min-height:45px;max-height:120px;
      background:rgba(255,255,255,.1);border:none;border-radius:25px;
      padding:15px 20px;color:#fff;font-size:1rem;resize:none;
    }
    
    #sendBtn{
      width:50px;height:50px;border-radius:50%;border:none;
      background:#25d366;color:#fff;cursor:pointer;font-size:1.2rem;
      transition:all .3s;
    }
    
    #sendBtn:hover:not(:disabled){transform:scale(1.05)}
    #sendBtn:disabled{opacity:.5;cursor:not-allowed}
    
    .photo-btn{
      width:50px;height:50px;border-radius:50%;border:none;
      background:rgba(255,255,255,.2);color:#fff;cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:1.3rem;
    }
    
    .connect-section{
      text-align:center;padding:40px;background:#202c33;
      border-bottom:1px solid #2a3942;
    }
    
    .connect-btn{
      background:linear-gradient(135deg,#25d366,#128c7e);
      color:#fff;border:none;padding:15px 40px;border-radius:25px;
      font-size:1.2rem;font-weight:600;cursor:pointer;transition:all .3s;
      margin:10px;
    }
    
    .connect-btn:hover{transform:scale(1.05);box-shadow:0 10px 25px rgba(37,211,102,.4)}
    
    @keyframes messageSlide{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes typingAnim{0%,100%{opacity:.4}50%{opacity:1}}
    
    @media(max-width:480px){
      .header{font-size:1.2rem;padding:15px 20px;justify-content:center}
      .input-area{padding:15px 20px}
    }
  </style>
</head>
<body>
  <!-- CONNECT SCREEN -->
  <div id="connectScreen" class="container" style="justify-content:center;align-items:center;">
    <div class="connect-section">
      <h1 style="font-size:3rem;margin-bottom:20px;">💬 WhatsApp</h1>
      <p style="margin-bottom:30px;font-size:1.2rem;color:#ccc;">2 tabs kholo = instant chat!</p>
      <button class="connect-btn" id="connectBtn">
        <i class="fas fa-rocket"></i> Friend se Connect 🔗
      </button>
      <div style="margin-top:20px;color:#8696a0;">
        Status: <span id="status">Waiting...</span>
      </div>
    </div>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chatScreen" class="container" style="display:none;">
    <div class="header">
      <i class="fas fa-comments"></i> WhatsApp Chat
    </div>
    
    <div class="status" id="onlineStatus">Connecting friend...</div>
    
    <div class="messages" id="messages">
      <div class="message received">
        <div>✨ Friend connected successfully!</div>
        <div class="message-time">Just now</div>
      </div>
      <div class="message sent">
        <div>Ab chat kar sakte hai! 🔥</div>
        <div class="message-time">Just now</div>
      </div>
    </div>
    
    <div class="typing" id="typingIndicator">
      <div style="width:8px;height:8px;background:#8696a0;border-radius:50%;"></div>
      <div style="width:8px;height:8px;background:#8696a0;border-radius:50%;animation-delay:.2s;animation:typingAnim 1.5s infinite;"></div>
      <div style="width:8px;height:8px;background:#8696a0;border-radius:50%;animation-delay:.4s;animation:typingAnim 1.5s infinite;"></div>
      <span>typing...</span>
    </div>
    
    <div class="input-area">
      <label class="photo-btn" for="photoInput">
        <i class="fas fa-camera"></i>
      </label>
      <input type="file" id="photoInput" accept="image/*" style="display:none">
      <textarea id="messageInput" placeholder="Type a message" rows="1"></textarea>
      <button id="sendBtn" disabled>
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  </div>

  <script>
    class WhatsAppChat {
      constructor() {
        this.socket = io('https://whatsapp-quick.onrender.com');
        this.connected = false;
        this.init();
      }

      init() {
        this.bindEvents();
        
        this.socket.on('connect', () => {
          document.getElementById('status').textContent = 'Connected to server ✅';
        });
        
        // Friend connection
        this.socket.on('friendConnected', () => {
          this.connected = true;
          document.getElementById('status').textContent = 'Friend connected! 🎉';
          setTimeout(() => {
            document.getElementById('connectScreen').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            document.getElementById('onlineStatus').textContent = 'Friend Online ✅';
          }, 1500);
        });
        
        // Messages
        this.socket.on('newMessage', msg => {
          if(msg.sender !== 'me') {
            this.addMessage(msg, 'received');
          }
        });
        
        this.socket.on('newImage', img => {
          if(img.sender !== 'me') {
            this.addImage(img, 'received');
          }
        });
        
        // Typing
        this.socket.on('typing', isTyping => {
          const typing = document.getElementById('typingIndicator');
          typing.style.display = isTyping ? 'flex' : 'none';
        });
      }

      bindEvents() {
        // Connect button
        document.getElementById('connectBtn').onclick = () => {
          this.socket.emit('joinChatRoom');
        };

        // Send message
        const sendBtn = document.getElementById('sendBtn');
        const input = document.getElementById('messageInput');
        
        sendBtn.onclick = () => this.sendMessage();
        input.onkeypress = e => {
          if(e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            this.sendMessage();
          }
        };
        
        input.oninput = () => {
          this.resizeInput();
          if(input.value.trim() && this.connected) {
            this.socket.emit('typing', true);
            sendBtn.disabled = false;
          } else {
            this.socket.emit('typing', false);
            sendBtn.disabled = true;
          }
        };

        // Photo
        document.getElementById('photoInput').onchange = e => this.sendPhoto(e);
      }

      sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if(!text || !this.connected) return;

        const msg = {
          text,
          time: new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}),
          sender: 'me'
        };

        this.addMessage(msg, 'sent');
        this.socket.emit('sendMessage', msg);
        
        input.value = '';
        this.resizeInput();
        input.focus();
        sendBtn.disabled = true;
        this.socket.emit('typing', false);
      }

      sendPhoto(event) {
        const file = event.target.files[0];
        if(!file || !this.connected) return;

        const reader = new FileReader();
        reader.onload = e => {
          const imgData = {
            data: e.target.result,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'}),
            sender: 'me'
          };
          
          this.addImage(imgData, 'sent');
          this.socket.emit('sendImage', imgData);
        };
        reader.readAsDataURL(file);
      }

      addMessage(msg, type) {
        const messages = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML = `
          <div>${msg.text}</div>
          <div class="message-time">${msg.time} 
            ${type === 'sent' ? '✅✅' : '✅'}
          </div>
        `;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }

      addImage(img, type) {
        const messages = document.getElementById('messages');
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML = `
          <div><img src="${img.data}" class="message-image" onclick="window.open(this.src)" style="max-width:250px;border-radius:15px;cursor:pointer"></div>
          <div class="message-time">${img.time} ✅✅</div>
        `;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      }

      resizeInput() {
        const input = document.getElementById('messageInput');
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
      }
    }

    // Start
    new WhatsAppChat();
  </script>
</body>
</html>
