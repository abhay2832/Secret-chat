<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureChat - Private Real-Time Chat</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            color: #333;
        }

        .screen {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        .screen.active {
            display: flex;
        }

        /* HOME SCREEN */
        #homeScreen {
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #fff, rgba(255,255,255,0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .room-input-container {
            background: rgba(255,255,255,0.95);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            backdrop-filter: blur(20px);
            max-width: 450px;
            width: 90%;
            margin-bottom: 20px;
        }

        .room-input-group {
            position: relative;
            margin-bottom: 25px;
        }

        #roomCode {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            transition: all 0.3s;
            background: rgba(255,255,255,0.8);
        }

        #roomCode:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
            transform: scale(1.02);
        }

        .join-btn, .create-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px 0;
        }

        .join-btn {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
        }

        .create-btn {
            background: linear-gradient(135deg, #ed8936, #dd6b20);
            color: white;
        }

        .join-btn:hover, .create-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
            max-width: 800px;
        }

        .feature {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        /* CHAT SCREEN */
        #chatScreen {
            background: #0a0e17;
        }

        .chat-header {
            background: rgba(0,0,0,0.9);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
        }

        .room-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .room-code {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .connection-status {
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        .status-connected {
            background: rgba(72,187,120,0.2);
            color: #48bb78;
        }

        .status-disconnected {
            background: rgba(239,68,68,0.2);
            color: #ef4444;
        }

        .call-controls {
            display: flex;
            gap: 15px;
        }

        .call-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .voice-call {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .video-call {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
        }

        .call-btn:hover {
            transform: scale(1.1);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            background: #0a0e17;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: messageSlideIn 0.4s ease-out;
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 65%;
            padding: 16px 20px;
            border-radius: 22px;
            position: relative;
            word-wrap: break-word;
            backdrop-filter: blur(15px);
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, rgba(102,126,234,0.9), rgba(118,75,162,0.9));
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message.received .message-bubble {
            background: rgba(255,255,255,0.15);
            color: white;
            border-bottom-left-radius: 6px;
        }

        .message-content {
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .message-time {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 8px;
            font-weight: 500;
        }

        .message-image {
            max-width: 280px;
            max-height: 300px;
            border-radius: 16px;
            cursor: pointer;
            margin-top: 8px;
        }

        .message-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: none;
            gap: 8px;
            background: rgba(0,0,0,0.7);
            padding: 4px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .message.sent:hover .message-actions {
            display: flex;
        }

        .action-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.8);
            font-size: 1rem;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .typing-indicator {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.6);
            font-style: italic;
            font-size: 0.9rem;
            animation: typingPulse 1.5s infinite;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        .input-container {
            padding: 25px;
            background: rgba(0,0,0,0.9);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: flex-end;
            gap: 15px;
        }

        #messageInput {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            padding: 18px 22px;
            color: white;
            font-size: 1rem;
            resize: none;
            min-height: 55px;
            max-height: 140px;
            outline: none;
            backdrop-filter: blur(15px);
            transition: all 0.3s;
        }

        #messageInput::placeholder {
            color: rgba(255,255,255,0.5);
        }

        #messageInput:focus {
            border-color: rgba(255,255,255,0.4);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
        }

        .emoji-picker {
            position: absolute;
            bottom: 100px;
            left: 25px;
            background: rgba(0,0,0,0.95);
            border-radius: 20px;
            padding: 20px;
            max-width: 300px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            gap: 10px;
            flex-wrap: wrap;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            z-index: 100;
        }

        .emoji {
            font-size: 1.8rem;
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .emoji:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.2);
        }

        .send-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #sendButton {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #sendButton:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(72,187,120,0.4);
        }

        #sendButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* CALL UI */
        .call-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(20px);
        }

        .call-container {
            text-align: center;
            color: white;
            max-width: 400px;
            padding: 40px;
            background: rgba(0,0,0,0.8);
            border-radius: 25px;
            backdrop-filter: blur(30px);
        }

        .call-type {
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .remote-video, .local-video {
            width: 300px;
            height: 200px;
            background: #333;
            border-radius: 15px;
            margin: 10px auto;
            object-fit: cover;
        }

        .local-video {
            width: 120px;
            height: 90px;
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .call-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .call-control-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .accept-call {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
        }

        .reject-call {
            background: linear-gradient(135deg, #f56565, #e53e3e);
            color: white;
        }

        .end-call {
            background: linear-gradient(135deg, #f56565, #e53e3e);
            color: white;
        }

        .call-control-btn:hover {
            transform: scale(1.1);
        }

        /* ENCRYPTION STATUS */
        .encryption-status {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(72,187,120,0.2);
            color: #48bb78;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        @keyframes typingPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .room-input-container {
                padding: 30px 20px;
                margin: 0 10px;
            }

            .logo {
                font-size: 2.5rem;
            }

            .features {
                grid-template-columns: 1fr;
            }

            .call-btn {
                width: 50px;
                height: 50px;
                font-size: 1.1rem;
            }

            .remote-video, .local-video {
                width: 100%;
                height: 250px;
            }

            .local-video {
                width: 80px;
                height: 60px;
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- HOME SCREEN -->
    <div id="homeScreen" class="screen active">
        <div class="logo">🔒 SecureChat</div>
        <div class="room-input-container">
            <div class="room-input-group">

                    id="roomCode"

            <button class="create-btn" id="createRoomBtn">Create New Room ✨</button>
        </div>
        <div class="features">
            <div class="feature">
                <div style="font-size: 2rem; margin-bottom: 10px;">🔐</div>
                <strong>End-to-End Encrypted</strong>
            </div>
            <div class="feature">
                <div style="font-size: 2rem; margin-bottom: 10px;">📹</div>
                <strong>Video Calling</strong>
            </div>
            <div class="feature">
                <div style="font-size: 2rem; margin-bottom: 10px;">🖼️</div>
                <strong>Photo Sharing</strong>
            </div>
            <div class="feature">
                <div style="font-size: 2rem; margin-bottom: 10px;">⚡</div>
                <strong>Real-Time</strong>
            </div>
        </div>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chatScreen" class="screen">
        <div class="encryption-status" id="encryptionStatus">🔒 E2E Encrypted</div>
        <div class="chat-header">
            <div class="room-info">
